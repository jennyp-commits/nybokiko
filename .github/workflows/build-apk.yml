name: 🔨 Build APK Trano Boky

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Permet de lancer manuellement

jobs:
  build-android:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Configurer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 4. Installer les dépendances
      - name: Install dependencies
        run: npm ci

       # Insérez cette étape juste avant la synchronisation Capacitor
      - name: Install TypeScript for Capacitor config
        run: npm install --no-save typescript
        
      # 5. Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 6. Rendre gradlew exécutable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 7. Build APK debug (prêt à installer)
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 8. Uploader l'APK comme artifact téléchargeable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trano-boky-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 9. Créer une release automatique (optionnel)
      - name: Get version
        id: version
        run: echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Trano Boky v${{ steps.version.outputs.VERSION }}
          body: |
            ## 📱 Trano Boky - Application Android
            ### Filazantsara Miako · FJKM Masobe
            
            **Télécharger et installer l'APK ci-dessous**
            
            > Pour installer : activer "Sources inconnues" dans les paramètres Android
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build APK Release signé (pour Google Play Store - optionnel)
  build-release:
    name: Build APK Release (signé)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # Ce job est désactivé jusqu'à configuration du keystore
    # Décommenter quand prêt pour le Play Store

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Nécessite KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD dans GitHub Secrets
      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/trano-boky.keystore
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=trano-boky.keystore \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            echo "Keystore non configuré - skipping release build"
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: trano-boky-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
